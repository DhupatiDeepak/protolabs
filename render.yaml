services:
  - type: web
    name: protolabs-api
    runtime: python
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FRONTEND_URL
        value: https://your-vercel-domain.vercel.app # Update this after vercel deployment
